---
name: Build Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "clamd.conf"
      - "freshclam.conf"
      - "clamav-blobavscan/**"
      - "tests/**"
      - ".coveragerc"
      - "pytest.ini"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/pr-build.yml"

  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "clamd.conf"
      - "freshclam.conf"
      - "clamav-blobavscan/**"
      - "tests/**"
      - ".coveragerc"
      - "pytest.ini"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/pr-build.yml"

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true

permissions: {}

jobs:
  python-tests:
    name: Python Unit Tests and Coverage
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            clamav-blobavscan/requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip

          python -m pip install \
            --requirement clamav-blobavscan/requirements.txt

          python -m pip install \
            pytest \
            coverage

      - name: Run Python tests with coverage
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p TestResults

          python -m coverage erase

          python -m coverage run \
            --branch \
            --source=clamav-blobavscan \
            --module pytest \
            tests/unit

          python -m coverage report \
            --show-missing \
            --fail-under=100

          python -m coverage xml \
            -o TestResults/coverage.cobertura.xml

      - name: Validate coverage report
        shell: bash
        run: |
          set -euo pipefail

          coverage_file="./TestResults/coverage.cobertura.xml"

          if [[ ! -s "${coverage_file}" ]]; then
            echo "::error::Coverage report was not generated"
            find ./TestResults -type f -print || true
            exit 1
          fi

          echo "Coverage report generated:"
          echo "${coverage_file}"

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./TestResults/coverage.cobertura.xml
          format: cobertura

  container-tests:
    name: Container Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Bats
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes bats

          bats --version

      - name: Build container image
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            --platform linux/amd64 \
            --tag clamav-blobavscan:latest \
            .

      - name: Run Bats container tests
        shell: bash
        run: |
          set -euo pipefail

          bats \
            --show-output-of-passing-tests \
            tests/container/