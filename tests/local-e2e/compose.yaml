services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    command: >-
      azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0
      --location /data --debug /data/debug.log
    ports:
      - "10000:10000"
      - "10001:10001"
    volumes:
      - azurite-data:/data

  setup:
    build:
      context: ../..
    entrypoint: ["python3", "/tests/local-e2e/setup.py"]
    environment: &scanner-environment
      # This must remain a single line: YAML folded blocks add spaces after
      # semicolons, which prevents the Azure SDK from finding AccountKey.
      STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNoGF+9W0ba2u5XK0q3Zz8q9K1Y4QzYc+P+AZ10J6iXHKhWXnkrL0T8Syb6vtL+z8YtKjlV+gvM4==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      queue_name: virus-scan
      result_queue_name: clamav-scan-result
      container_name: datahub
    volumes:
      - ./:/tests/local-e2e:ro
    depends_on:
      - azurite

  scanner:
    build:
      context: ../..
    environment: *scanner-environment
    depends_on:
      - azurite

  verify:
    build:
      context: ../..
    entrypoint: ["python3", "/tests/local-e2e/verify.py"]
    environment: *scanner-environment
    volumes:
      - ./:/tests/local-e2e:ro
    depends_on:
      - azurite

volumes:
  azurite-data:
