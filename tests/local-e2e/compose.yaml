services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    environment:
      # Use a test-only account with a valid Base64 key instead of relying on
      # Azurite's development-account key.
      AZURITE_ACCOUNTS: localtestaccount:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    command: >-
      azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --skipApiVersionCheck
      --location /data --debug /data/debug.log
    ports:
      - "10000:10000"
      - "10001:10001"
    volumes:
      - azurite-data:/data

  setup:
    build:
      context: ../..
    entrypoint: ["python3", "/tests/local-e2e/setup.py"]
    environment: &scanner-environment
      # This must remain a single line: YAML folded blocks add spaces after
      # semicolons, which prevents the Azure SDK from finding AccountKey.
      STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=localtestaccount;AccountKey=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=;BlobEndpoint=http://azurite:10000/localtestaccount;QueueEndpoint=http://azurite:10001/localtestaccount;TableEndpoint=http://azurite:10002/localtestaccount;"
      queue_name: virus-scan
      result_queue_name: clamav-scan-result
      container_name: datahub
    volumes:
      - ./:/tests/local-e2e:ro
    depends_on:
      - azurite

  scanner:
    build:
      context: ../..
    environment: *scanner-environment
    depends_on:
      - azurite

  verify:
    build:
      context: ../..
    entrypoint: ["python3", "/tests/local-e2e/verify.py"]
    environment: *scanner-environment
    volumes:
      - ./:/tests/local-e2e:ro
    depends_on:
      - azurite

volumes:
  azurite-data:
